<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="glow0" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spark0" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Core spark -->
  <circle cx="64" cy="64" r="8" fill="url(#spark0)" filter="url(#glow0)"/>
  <!-- Star rays -->
  <line x1="64" y1="52" x2="64" y2="44" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glow0)" opacity="0.8"/>
  <line x1="64" y1="76" x2="64" y2="84" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glow0)" opacity="0.8"/>
  <line x1="52" y1="64" x2="44" y2="64" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glow0)" opacity="0.8"/>
  <line x1="76" y1="64" x2="84" y2="64" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glow0)" opacity="0.8"/>
  <line x1="55" y1="55" x2="50" y2="50" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow0)" opacity="0.6"/>
  <line x1="73" y1="55" x2="78" y2="50" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow0)" opacity="0.6"/>
  <line x1="55" y1="73" x2="50" y2="78" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow0)" opacity="0.6"/>
  <line x1="73" y1="73" x2="78" y2="78" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow0)" opacity="0.6"/>
  <!-- White hot core -->
  <circle cx="64" cy="64" r="3" fill="#ffffff" filter="url(#glow0)"/>
</svg>
