  <circle cx="60" cy="98" r="1.5" fill="#0088ff" filter="url(#glow5)" opacity="0.3"/>
  <circle cx="115" cy="44" r="1.5" fill="#00ffff" filter="url(#glow5)" opacity="0.3"/>
  <circle cx="115" cy="84" r="1.5" fill="#00ffff" filter="url(#glow5)" opacity="0.3"/>
  <circle cx="40" cy="36" r="1" fill="#0088ff" filter="url(#glow5)" opacity="0.2"/>
