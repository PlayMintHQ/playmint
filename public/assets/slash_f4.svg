<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dissolving arc - breaking into particles/streaks -->
  <!-- Fading main arc segments -->
  <path d="M 14,64 C 20,30 60,18 90,36" stroke="#00ffff" stroke-width="3.5" fill="none" stroke-linecap="round" filter="url(#glow4)" opacity="0.6"/>
  <path d="M 100,52 C 112,62 112,72 100,82" stroke="#00ffff" stroke-width="3.5" fill="none" stroke-linecap="round" filter="url(#glow4)" opacity="0.5"/>
  <path d="M 90,92 C 60,110 20,98 14,64" stroke="#0088ff" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow4)" opacity="0.4"/>
  <!-- Breaking particles -->
  <circle cx="90" cy="36" r="4" fill="#00ffff" filter="url(#glow4)" opacity="0.9"/>
  <circle cx="100" cy="52" r="3" fill="#ffffff" filter="url(#glow4)" opacity="0.8"/>
  <circle cx="100" cy="76" r="3" fill="#ffffff" filter="url(#glow4)" opacity="0.8"/>
  <circle cx="90" cy="92" r="4" fill="#00ffff" filter="url(#glow4)" opacity="0.9"/>
  <!-- Flying debris -->
  <line x1="95" y1="33" x2="108" y2="22" stroke="#00ffff" stroke-width="2" stroke-linecap="round" filter="url(#glow4)" opacity="0.7"/>
  <line x1="106" y1="60" x2="120" y2="56" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" filter="url(#glow4)" opacity="0.6"/>
  <line x1="95" y1="95" x2="108" y2="106" stroke="#0088ff" stroke-width="2" stroke-linecap="round" filter="url(#glow4)" opacity="0.7"/>
  <circle cx="115" cy="50" r="2" fill="#00ffff" filter="url(#glow4)" opacity="0.6"/>
  <circle cx="115" cy="78" r="2" fill="#00ffff" filter="url(#glow4)" opacity="0.6"/>
  <circle cx="40" cy="22" r="2" fill="#0088ff" filter="url(#glow4)" opacity="0.4"/>
  <circle cx="38" cy="106" r="2" fill="#0088ff" filter="url(#glow4)" opacity="0.4"/>
</svg>
